
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Core | Тлегенов Амирхан</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --primary: #00f3ff;
            --accent: #ff00ea;
            --danger: #ff2a2a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: white; user-select: none;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* Имя автора */
        #author-badge {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; font-size: 0.9rem; font-weight: 700;
            color: var(--primary); text-transform: uppercase; z-index: 100;
            display: flex; align-items: center; gap: 10px;
        }

        /* Кнопка Паузы в игре */
        #pause-trigger {
            position: absolute; top: 20px; left: 20px;
            background: var(--glass-bg); border: 1px solid var(--primary);
            color: var(--primary); padding: 8px 15px; border-radius: 10px;
            cursor: pointer; z-index: 100; display: none; font-weight: bold;
            transition: all 0.3s;
        }
        #pause-trigger:hover { background: var(--primary); color: #000; }

        /* Слои меню */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 50;
        }

        .menu-card { padding: 40px 60px; text-align: center; min-width: 300px; }

        h1 {
            font-weight: 900; font-size: 3.5rem; margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn {
            background: transparent; color: white; border: 2px solid var(--primary);
            padding: 12px 30px; font-size: 1rem; font-weight: 700;
            border-radius: 30px; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 2px; margin: 10px;
            width: 220px;
        }

        .btn:hover {
            background: var(--primary); color: #000;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .btn.secondary { border-color: var(--accent); color: var(--accent); }
        .btn.secondary:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(255, 0, 234, 0.5); }

        #hud {
            position: absolute; top: 60px; left: 40px;
            font-size: 5rem; font-weight: 900; color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.8);
            z-index: 5; opacity: 0; pointer-events: none;
        }

        canvas { display: block; cursor: none; }
    </style>
</head>
<body>

    <div id="author-badge" class="glass">Тлегенов Амирхан</div>
    
    <button id="pause-trigger" onclick="togglePause()">ПАУЗА (P)</button>

    <div id="main-menu-layer" class="overlay">
        <div class="menu-card glass">
            <h1 id="menu-title">NEON CORE</h1>
            <div style="margin: 20px 0; color: #888;">Рекорд: <span id="best-score">0</span></div>
            <button class="btn" onclick="startGame()">Начать игру</button>
        </div>
    </div>

    <div id="pause-menu-layer" class="overlay" style="display: none;">
        <div class="menu-card glass">
            <h1>ПАУЗА</h1>
            <div style="margin-bottom: 30px; color: #888;">Игра приостановлена</div>
            <button class="btn" onclick="togglePause()">Продолжить</button><br>
            <button class="btn secondary" onclick="exitToMenu()">Выйти в меню</button>
        </div>
    </div>

    <div id="hud">0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const mainMenu = document.getElementById('main-menu-layer');
        const pauseMenu = document.getElementById('pause-menu-layer');
        const pauseBtn = document.getElementById('pause-trigger');
        const bestScoreEl = document.getElementById('best-score');
        const menuTitle = document.getElementById('menu-title');

        let width, height, animationId;
        let isPlaying = false;
        let isPaused = false;
        let score = 0;
        let bestScore = localStorage.getItem('neonCoreBest') || 0;
        bestScoreEl.innerText = bestScore;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let mouse = { x: width / 2, y: height / 2 };
        window.addEventListener('mousemove', (e) => {
            if (!isPaused) {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            }
        });

        // Слушатель клавиш для паузы
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p' || e.key === 'Escape') {
                if (isPlaying) togglePause();
            }
        });

        class Player {
            constructor() {
                this.x = width / 2; this.y = height / 2;
                this.radius = 12; this.trail = [];
                this.maxTrail = 30;
            }
            update() {
                this.x += (mouse.x - this.x) * 0.15;
                this.y += (mouse.y - this.y) * 0.15;
                this.trail.unshift({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) this.trail.pop();
            }
            draw() {
                if (this.trail.length > 2) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length - 1; i++) {
                        const xc = (this.trail[i].x + this.trail[i + 1].x) / 2;
                        const yc = (this.trail[i].y + this.trail[i + 1].y) / 2;
                        ctx.quadraticCurveTo(this.trail[i].x, this.trail[i].y, xc, yc);
                    }
                    ctx.strokeStyle = "rgba(0, 243, 255, 0.5)";
                    ctx.lineWidth = this.radius; ctx.lineCap = 'round'; ctx.stroke();
                }
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00f3ff';
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Energy {
            constructor() {
                this.x = Math.random() * (width - 100) + 50;
                this.y = Math.random() * (height - 100) + 50;
                this.angle = 0;
            }
            draw() {
                this.angle += 0.1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8 + Math.sin(this.angle) * 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ff00ea';
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff00ea';
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Enemy {
            constructor(speedMult) {
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { this.x = -30; this.y = Math.random() * height; }
                else if (side === 1) { this.x = width + 30; this.y = Math.random() * height; }
                else if (side === 2) { this.x = Math.random() * width; this.y = -30; }
                else { this.x = Math.random() * width; this.y = height + 30; }
                const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
                const speed = (2 + Math.random() * 2) * speedMult;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
            }
            update() { this.x += this.vx; this.y += this.vy; }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#ff2a2a'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff2a2a';
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        let player, energies, enemies, frames;

        function startGame() {
            player = new Player();
            energies = [new Energy()];
            enemies = [];
            score = 0;
            frames = 0;
            isPaused = false;
            hud.innerText = score;
            mainMenu.style.display = 'none';
            pauseMenu.style.display = 'none';
            pauseBtn.style.display = 'block';
            hud.style.opacity = '1';
            isPlaying = true;
            loop();
        }

        function togglePause() {
            if (!isPlaying) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseMenu.style.display = 'flex';
                canvas.style.filter = 'blur(5px)';
            } else {
                pauseMenu.style.display = 'none';
                canvas.style.filter = 'none';
                loop(); // Возобновляем цикл
            }
        }

        function exitToMenu() {
            isPlaying = false;
            isPaused = false;
            cancelAnimationFrame(animationId);
            pauseMenu.style.display = 'none';
            mainMenu.style.display = 'flex';
            pauseBtn.style.display = 'none';
            hud.style.opacity = '0';
            canvas.style.filter = 'none';
            menuTitle.innerText = "NEON CORE";
        }

        function gameOver() {
            isPlaying = false;
            pauseBtn.style.display = 'none';
            cancelAnimationFrame(animationId);
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('neonCoreBest', bestScore);
                bestScoreEl.innerText = bestScore;
            }
            mainMenu.style.display = 'flex';
            hud.style.opacity = '0';
            menuTitle.innerText = "GAME OVER";
        }

        function loop() {
            if (!isPlaying || isPaused) return;
            
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);

            frames++;
            if (frames % Math.max(20, 60 - score) === 0) enemies.push(new Enemy(1 + score * 0.05));

            player.update();
            player.draw();

            energies.forEach((en, i) => {
                en.draw();
                if (Math.hypot(player.x - en.x, player.y - en.y) < player.radius + 20) {
                    energies.splice(i, 1);
                    score++;
                    hud.innerText = score;
                    energies.push(new Energy());
                }
            });

            enemies.forEach((en, i) => {
                en.update();
                en.draw();
                if (Math.hypot(player.x - en.x, player.y - en.y) < player.radius + 10) gameOver();
                if (en.x < -100 || en.x > width + 100 || en.y < -100 || en.y > height + 100) enemies.splice(i, 1);
            });

            animationId = requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
