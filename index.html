<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Core | Тлегенов Амирхан</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --primary: #00f3ff;
            --accent: #ff00ea;
            --danger: #ff2a2a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: white; user-select: none;
            touch-action: none; /* Важно для мобилок */
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        #author-badge {
            position: absolute; top: 15px; right: 15px;
            padding: 8px 15px; font-size: 0.8rem; font-weight: 700;
            color: var(--primary); text-transform: uppercase; z-index: 100;
            display: flex; align-items: center; gap: 8px;
            pointer-events: none;
        }

        #pause-trigger {
            position: absolute; top: 15px; left: 15px;
            background: var(--glass-bg); border: 1px solid var(--primary);
            color: var(--primary); padding: 8px 15px; border-radius: 10px;
            cursor: pointer; z-index: 100; display: none; font-weight: bold;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 50;
            background: rgba(0,0,0,0.7);
        }

        .menu-card { padding: 30px; text-align: center; width: 80%; max-width: 400px; }

        h1 {
            font-weight: 900; font-size: 2.5rem; margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn {
            background: var(--primary); color: #000; border: none;
            padding: 15px 30px; font-size: 1.1rem; font-weight: 700;
            border-radius: 30px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; margin: 10px 0; width: 100%;
        }

        .btn:active { transform: scale(0.95); }

        .btn-outline {
            background: transparent; color: var(--accent); border: 2px solid var(--accent);
        }

        #hud {
            position: absolute; top: 50px; left: 20px;
            font-size: 4rem; font-weight: 900; color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.8);
            z-index: 5; opacity: 0; pointer-events: none;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="author-badge" class="glass">Тлегенов Амирхан</div>
    <button id="pause-trigger">ПАУЗА</button>

    <div id="main-menu-layer" class="overlay">
        <div class="menu-card glass">
            <h1 id="menu-title">NEON CORE</h1>
            <p style="color: #888;">Рекорд: <span id="best-score">0</span></p>
            <button class="btn" id="start-btn">Начать игру</button>
        </div>
    </div>

    <div id="pause-menu-layer" class="overlay" style="display: none;">
        <div class="menu-card glass">
            <h1>ПАУЗА</h1>
            <button class="btn" id="resume-btn">Продолжить</button>
            <button class="btn btn-outline" id="exit-btn">В меню</button>
        </div>
    </div>

    <div id="hud">0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const mainMenu = document.getElementById('main-menu-layer');
        const pauseMenu = document.getElementById('pause-menu-layer');
        const pauseBtn = document.getElementById('pause-trigger');
        const bestScoreEl = document.getElementById('best-score');
        const menuTitle = document.getElementById('menu-title');

        let width, height, animationId, isPlaying = false, isPaused = false;
        let score = 0, bestScore = localStorage.getItem('neonCoreBest') || 0;
        bestScoreEl.innerText = bestScore;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let mouse = { x: width / 2, y: height / 2 };

        // УПРАВЛЕНИЕ (Мышь + Тач)
        const updateInput = (x, y) => {
            if (isPlaying && !isPaused) {
                mouse.x = x;
                mouse.y = y;
            }
        };

        window.addEventListener('mousemove', (e) => updateInput(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            updateInput(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        // КЛАССЫ
        class Player {
            constructor() {
                this.x = width / 2; this.y = height / 2;
                this.radius = 15; this.trail = [];
            }
            update() {
                this.x += (mouse.x - this.x) * 0.15;
                this.y += (mouse.y - this.y) * 0.15;
                this.trail.unshift({ x: this.x, y: this.y });
                if (this.trail.length > 25) this.trail.pop();
            }
            draw() {
                if (this.trail.length > 2) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length - 1; i++) {
                        const xc = (this.trail[i].x + this.trail[i + 1].x) / 2;
                        const yc = (this.trail[i].y + this.trail[i + 1].y) / 2;
                        ctx.quadraticCurveTo(this.trail[i].x, this.trail[i].y, xc, yc);
                    }
                    ctx.strokeStyle = "rgba(0, 243, 255, 0.6)";
                    ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.stroke();
                }
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00f3ff';
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Energy {
            constructor() {
                this.x = Math.random() * (width - 60) + 30;
                this.y = Math.random() * (height - 60) + 30;
                this.a = 0;
            }
            draw() {
                this.a += 0.1;
                ctx.beginPath(); ctx.arc(this.x, this.y, 8 + Math.sin(this.a) * 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ff00ea'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff00ea';
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Enemy {
            constructor(m) {
                const s = Math.floor(Math.random() * 4);
                if (s === 0) { this.x = -30; this.y = Math.random() * height; }
                else if (s === 1) { this.x = width + 30; this.y = Math.random() * height; }
                else if (s === 2) { this.x = Math.random() * width; this.y = -30; }
                else { this.x = Math.random() * width; this.y = height + 30; }
                const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
                const speed = (2 + Math.random() * 2) * m;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
            }
            update() { this.x += this.vx; this.y += this.vy; }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#ff2a2a'; ctx.fill();
            }
        }

        let player, energies, enemies, frames;

        function startGame() {
            player = new Player(); energies = [new Energy()]; enemies = [];
            score = 0; frames = 0; isPaused = false; isPlaying = true;
            hud.innerText = score;
            mainMenu.style.display = 'none';
            pauseMenu.style.display = 'none';
            pauseBtn.style.display = 'block';
            hud.style.opacity = '1';
            loop();
        }

        function togglePause() {
            if (!isPlaying) return;
            isPaused = !isPaused;
            pauseMenu.style.display = isPaused ? 'flex' : 'none';
            if (!isPaused) loop();
        }

        function exitToMenu() {
            isPlaying = false; isPaused = false;
            mainMenu.style.display = 'flex';
            pauseMenu.style.display = 'none';
            pauseBtn.style.display = 'none';
            hud.style.opacity = '0';
            menuTitle.innerText = "NEON CORE";
        }

        function gameOver() {
            isPlaying = false; pauseBtn.style.display = 'none';
            if (score > bestScore) {
                bestScore = score; localStorage.setItem('neonCoreBest', bestScore);
                bestScoreEl.innerText = bestScore;
            }
            mainMenu.style.display = 'flex';
            hud.style.opacity = '0';
            menuTitle.innerText = "GAME OVER";
        }

        function loop() {
            if (!isPlaying || isPaused) return;
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; ctx.fillRect(0, 0, width, height);
            frames++;
            if (frames % Math.max(20, 60 - score) === 0) enemies.push(new Enemy(1 + score * 0.05));
            player.update(); player.draw();
            energies.forEach((en, i) => {
                en.draw();
                if (Math.hypot(player.x - en.x, player.y - en.y) < player.radius + 20) {
                    energies.splice(i, 1); score++; hud.innerText = score; energies.push(new Energy());
                }
            });
            enemies.forEach((en, i) => {
                en.update(); en.draw();
                if (Math.hypot(player.x - en.x, player.y - en.y) < player.radius + 10) gameOver();
                if (en.x < -100 || en.x > width + 100 || en.y < -100 || en.y > height + 100) enemies.splice(i, 1);
            });
            animationId = requestAnimationFrame(loop);
        }

        // ПРИВЯЗКА КНОПОК
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('pause-trigger').addEventListener('click', togglePause);
        document.getElementById('resume-btn').addEventListener('click', togglePause);
        document.getElementById('exit-btn').addEventListener('click', exitToMenu);

        // Кнопки клавиатуры
     window.addEventListener('keydown', (e) => {
            // Проверяем английскую 'p', русскую 'з' и Escape
            const key = e.key.toLowerCase();
            if (key === 'p' || key === 'з' || key === 'escape') {
                togglePause();
            }
        });
        });
    </script>
</body>
</html>
